# VPS deploy: put your .env next to this file, then `docker compose pull && docker compose up -d`.
services:
  keep-asking-task-designer:
    image: ghcr.io/michael-borck/keep-asking-task-designer:latest
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080" # map to a reverse proxy (Caddy/nginx/Traefik) for HTTPS in front
